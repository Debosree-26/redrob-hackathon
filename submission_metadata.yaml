# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude for architectural discussion, code review, and presentation
  preparation. All candidate ranking logic, scoring formula design, threshold
  decisions, and engineering iteration were done by the team. No candidate
  data was fed to any LLM during the ranking step. The ranking code runs
  fully offline on precomputed artifacts with no API calls.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Two-stage pipeline built around the JD principle: "10 great matches > 1000
  maybes." Stage 1 applies rule-based hard filters (verification, notice
  period, location, career integrity, honeypot detection) reducing 100K to
  ~1,052 survivors. Stage 2 scores survivors on Feature (40%), Semantic (35%),
  and Behavioral (25%) signals multiplied by stacked penalty factors.

  Semantic scoring uses BAAI/BGE-M3 hybrid dense+sparse embeddings against the
  real JD embedding (not a centroid proxy), combined with keyword matching for
  must-haves and nice-to-haves. Two custom multipliers reward candidates who
  combine ML depth with shipping culture (shipper multiplier x1.15) and apply
  no penalty to LangChain users with classical IR roots (pre-LLM multiplier).
  Behavioral scoring weights recruiter response rate (35%) heavily as the
  primary reachability signal. Runtime: ranking step <1 min on CPU.

